<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/main.js"></script>
    <title>Document</title>
</head>
<body>
    <div>
        <h1>Ejercicio 1 Mostrar Saludo</h1>
        <input type="text" class="name" placeholder="Escriba su nombre aqui..">
        <input type="text" class="edad" placeholder="Escriba su Edad aqui..">
        <button id="btn-message">click me!</button>
    </div>
    <div>
        <h2>Ejercicio 2 Crear un objeto auto y mostrarlo</h2>
        <input type="text" class="color-car" placeholder="Escriba Color aqui..">
        <input type="text" class="marca-car" placeholder="Escriba Marca aqui..">
        <input type="text" class="modelo-car" placeholder="Escriba Modelo aqui..">
        <button id="btn-create-car">Crear auto</button>

        <div id="info-car"></div>

    </div>
    <div>
        <h3>Ejercicio 3 Filtrar autos por color</h3>
        <input type="text" class="color-car-3" placeholder="Escriba Color aqui..">
        <button id="btn-view-car">Ver Disponibles</button>

        <div id="view-cars-3"></div>

    </div>
    <div>
        <h4>Ejercicio 4 Mostrar una lista de autos marca FIAT</h4>

        <button id="btn-car-4">Ver Disponibles</button>

        <div id="view-cars-4"></div>

    </div>
</body>
</html>
